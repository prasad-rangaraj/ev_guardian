<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>BMS Digital Twin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; }
  canvas { display: block; width: 100% !important; height: 100% !important; }
  #loading {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #3253DC; font-family: monospace; font-size: 14px; font-weight: 700;
    background: #0d1117; z-index: 10;
  }
  #loading-bar-wrap { width: 180px; height: 4px; background: #1e2533; border-radius: 4px; margin-top: 12px; overflow: hidden; }
  #loading-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #3253DC, #60a5fa); border-radius: 4px; transition: width 0.3s ease; }
  #legend {
    position: absolute; top: 12px; left: 12px;
    display: flex; flex-direction: column; gap: 6px; pointer-events: none;
  }
  .legend-item {
    display: flex; align-items: center; gap: 7px;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    padding: 4px 10px;
  }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { color: #e2e8f0; font-family: monospace; font-size: 11px; font-weight: 700; }
  #hint {
    position: absolute; bottom: 10px; right: 14px;
    color: rgba(255,255,255,0.3); font-family: monospace; font-size: 10px; pointer-events: none;
  }
  #watermark {
    position: absolute; top: 12px; right: 12px;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
    border: 1px solid rgba(50,83,220,0.4); border-radius: 8px; padding: 5px 12px;
    color: #3253DC; font-family: monospace; font-size: 10px; font-weight: 700; pointer-events: none;
  }
  #thermal-legend {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    display: none; flex-direction: column; align-items: center; gap: 4px; pointer-events: none;
  }
  #thermal-legend .temp-label { color: #e2e8f0; font-family: monospace; font-size: 10px; font-weight: 700; }
  #thermal-gradient { width: 12px; height: 120px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15);
    background: linear-gradient(to bottom, hsl(0,100%,50%), hsl(60,100%,50%), hsl(120,100%,50%)); }
</style>
</head>
<body>

<div id="loading">
  <div>🚗 Loading Digital Twin...</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<div id="legend">
  <div class="legend-item" id="legend-healthy" style="display:flex">
    <div class="legend-dot" style="background:#b0c4d8; box-shadow:0 0 6px #b0c4d8"></div>
    <span class="legend-label">HEALTHY MODULE</span>
  </div>
  <div class="legend-item" id="legend-weak" style="display:flex">
    <div class="legend-dot" style="background:#c0392b; box-shadow:0 0 6px #c0392b"></div>
    <span class="legend-label">WEAK MODULE</span>
  </div>
</div>

<div id="thermal-legend">
  <span class="temp-label">60°C</span>
  <div id="thermal-gradient"></div>
  <span class="temp-label">20°C</span>
</div>

<div id="watermark">🚗 LIVE VEHICLE DIGITAL TWIN</div>
<div id="hint">Drag to orbit • Pinch to zoom</div>

<script src="three.min.js"></script>
<script>
// Polyfill: make sure THREE is available before addons load
</script>
<script src="GLTFLoader.js"></script>
<script src="OrbitControls.js"></script>

<script>
'use strict';

// ─── State ────────────────────────────────────────────────────────────────────
let viewMode = 'voltage';
let telemetry = { temp1: 34, temp2: 33, cell1: 4.01, cell2: 4.02, cell3: 3.98, cell4: 4.0 };
let moduleMeshes = []; // References to each battery module mesh

// ─── Scene Setup ──────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0d1117');

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 4, 14);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.minDistance = 4;
controls.maxDistance = 24;
controls.minPolarAngle = 0;
controls.maxPolarAngle = Math.PI / 2.1;
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// ─── Lights ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight1.position.set(5, 10, 5);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight2.position.set(-5, 8, -5);
scene.add(dirLight2);

const pLight1 = new THREE.PointLight(0x3253DC, 2.0);
pLight1.position.set(0, 5, 4);
scene.add(pLight1);

const pLight2 = new THREE.PointLight(0x60a5fa, 1.5);
pLight2.position.set(0, 2, -4);
scene.add(pLight2);

// ─── Grid ────────────────────────────────────────────────────────────────────
const gridHelper = new THREE.GridHelper(40, 40, 0x3253DC, 0x1e2533);
gridHelper.position.y = -1.6;
scene.add(gridHelper);

// ─── Battery Skateboard Pack (below the car floor) ───────────────────────────
function getModuleColor(idx, mode, telem) {
  const { temp1, temp2, cell1, cell2, cell3, cell4 } = telem;
  const voltages = [cell1, cell2, cell3, cell4];

  if (mode === 'thermal') {
    const temp = idx < 4 ? temp1 : temp2;
    const t = Math.max(0, Math.min(1, (temp - 20) / 40));
    const hue = (1 - t) * 120;
    return new THREE.Color(`hsl(${hue}, 90%, 40%)`);
  }
  const v = voltages[idx % 4];
  return v < 3.85 ? new THREE.Color('#c0392b') : new THREE.Color('#b0c4d8');
}

function buildBatteryPack() {
  const packGroup = new THREE.Group();
  packGroup.position.set(0, -1.5, 0);

  const moduleW = 1.10, moduleD = 0.70, moduleH = 0.18;
  const gapX = 0.08, gapZ = 0.08;
  const cols = 2, rows = 5;

  const trayW = cols * moduleW + (cols - 1) * gapX + 0.22;
  const trayD = rows * moduleD + (rows - 1) * gapZ + 0.22;
  const trayH = 0.08;

  // Bottom tray
  const trayGeo = new THREE.BoxGeometry(trayW, trayH, trayD);
  const trayMat = new THREE.MeshStandardMaterial({ color: '#8c9aaa', metalness: 0.95, roughness: 0.25 });
  const tray = new THREE.Mesh(trayGeo, trayMat);
  tray.position.y = -trayH / 2;
  packGroup.add(tray);

  // Tray walls
  const wallDefs = [
    { pos: [0, moduleH/2, -(trayD/2)+0.025], size: [trayW, moduleH+0.05, 0.05] },
    { pos: [0, moduleH/2,  (trayD/2)-0.025], size: [trayW, moduleH+0.05, 0.05] },
    { pos: [-(trayW/2)+0.025, moduleH/2, 0],  size: [0.05, moduleH+0.05, trayD] },
    { pos: [ (trayW/2)-0.025, moduleH/2, 0],  size: [0.05, moduleH+0.05, trayD] },
  ];
  const wallMat = new THREE.MeshStandardMaterial({ color: '#7a8899', metalness: 0.95, roughness: 0.2 });
  wallDefs.forEach(w => {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(...w.size), wallMat);
    mesh.position.set(...w.pos);
    packGroup.add(mesh);
  });

  // Cooling plate
  const coolingGeo = new THREE.BoxGeometry(trayW - 0.08, 0.02, trayD - 0.08);
  const coolingMat = new THREE.MeshStandardMaterial({ color: '#1a5a8a', metalness: 0.9, roughness: 0.3 });
  const cooling = new THREE.Mesh(coolingGeo, coolingMat);
  cooling.position.y = -0.01;
  packGroup.add(cooling);

  // Battery modules
  moduleMeshes = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = r * cols + c;
      const x = (c - (cols - 1) / 2) * (moduleW + gapX);
      const z = (r - (rows - 1) / 2) * (moduleD + gapZ);

      const color = getModuleColor(idx, viewMode, telemetry);
      const mat = new THREE.MeshStandardMaterial({
        color: color, metalness: 0.6, roughness: 0.35,
        emissive: color, emissiveIntensity: 0.25
      });
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(moduleW, moduleH, moduleD), mat);
      mesh.position.set(x, moduleH / 2, z);
      packGroup.add(mesh);
      moduleMeshes.push({ mesh, idx });

      // Top gloss layer
      const glossMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.9, roughness: 0.1, emissive: color, emissiveIntensity: 0.3 });
      const glossMesh = new THREE.Mesh(new THREE.BoxGeometry(moduleW - 0.03, 0.005, moduleD - 0.03), glossMat);
      glossMesh.position.set(x, moduleH + 0.002, z);
      packGroup.add(glossMesh);

      // Vents
      [-0.3, -0.1, 0.1, 0.3].forEach(vx => {
        const ventMat = new THREE.MeshStandardMaterial({ color: '#4a5a6a', metalness: 0.9, roughness: 0.1 });
        const vent = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.006, moduleD - 0.06), ventMat);
        vent.position.set(x + vx, moduleH + 0.006, z);
        packGroup.add(vent);
      });
    }
  }

  // HV Busbars (orange)
  const busbarMat = new THREE.MeshStandardMaterial({ color: '#e05a00', metalness: 0.7, roughness: 0.2, emissive: '#ff4400', emissiveIntensity: 0.6 });
  const spine = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.03, trayD - 0.12), busbarMat);
  spine.position.set(0, moduleH + 0.025, 0);
  packGroup.add(spine);

  for (let bi = 0; bi < rows - 1; bi++) {
    const bz = (bi - (rows - 2) / 2) * (moduleD + gapZ);
    const cross = new THREE.Mesh(new THREE.BoxGeometry(trayW - 0.12, 0.03, 0.065), busbarMat.clone());
    cross.position.set(0, moduleH + 0.025, bz + (moduleD + gapZ) / 2);
    packGroup.add(cross);
  }

  // BMS connector block (orange)
  const bmsBlock = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.08, 0.10), busbarMat.clone());
  bmsBlock.position.set(0, moduleH + 0.03, -(trayD / 2) + 0.03);
  packGroup.add(bmsBlock);

  return packGroup;
}

const batteryPack = buildBatteryPack();
scene.add(batteryPack);

// ─── Load Car GLB ─────────────────────────────────────────────────────────────
const loadingBar = document.getElementById('loading-bar');
const loadingDiv = document.getElementById('loading');

const loader = new THREE.GLTFLoader();
loader.load(
  'ev_car.glb',
  (gltf) => {
    const carScene = gltf.scene;

    carScene.traverse((child) => {
      if (child.isMesh) {
        const name = child.name.toLowerCase();
        if (name.includes('exhaust') || name.includes('muffler') || name.includes('tailpipe') || name.includes('pipe')) {
          child.visible = false;
          return;
        }
        if (child.material) {
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach(mat => {
            mat.transparent = true;
            mat.opacity = 0.18;
            mat.depthWrite = false;
            mat.color = new THREE.Color('#a8c8ff');
            mat.emissive = new THREE.Color('#3253DC');
            mat.emissiveIntensity = 0.35;
            mat.metalness = 0.9;
            mat.roughness = 0.05;
            mat.side = THREE.DoubleSide;
            mat.needsUpdate = true;
          });
        }
      }
    });

    carScene.position.set(0, -1.2, 0);
    carScene.scale.set(2.2, 2.2, 2.2);
    scene.add(carScene);
    loadingDiv.style.display = 'none';
  },
  (progress) => {
    const pct = (progress.loaded / progress.total) * 100;
    loadingBar.style.width = pct + '%';
  },
  (err) => {
    console.error('GLTF load error:', err);
    loadingDiv.innerHTML = '<div style="color:#e55">⚠️ Failed to load model</div>';
    setTimeout(() => { loadingDiv.style.display = 'none'; }, 2000);
  }
);

// ─── Update Battery Colors ────────────────────────────────────────────────────
function refreshBatteryColors() {
  moduleMeshes.forEach(({ mesh, idx }) => {
    const newColor = getModuleColor(idx, viewMode, telemetry);
    mesh.material.color.set(newColor);
    mesh.material.emissive.set(newColor);
    mesh.material.emissiveIntensity = viewMode === 'thermal' || telemetry[`cell${(idx % 4) + 1}`] < 3.85 ? 0.4 : 0.08;
  });
}

// ─── Exposed JS API (called by Android WebView.evaluateJavascript) ────────────
window.updateTelemetry = function(mode, temp1, temp2, cell1, cell2, cell3, cell4) {
  viewMode = mode;
  telemetry = { temp1, temp2, cell1, cell2, cell3, cell4 };
  refreshBatteryColors();

  // Update legend visibility
  const voltageLegend = document.getElementById('legend');
  const thermalLegend = document.getElementById('thermal-legend');
  if (mode === 'thermal') {
    voltageLegend.style.display = 'none';
    thermalLegend.style.display = 'flex';
  } else {
    voltageLegend.style.display = 'flex';
    thermalLegend.style.display = 'none';
  }
};

// ─── Animate ──────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Subtle gentle auto-rotation when user is not interacting
  if (!controls.isDragging) {
    // Gentle oscillating drift
  }
  
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ─── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
